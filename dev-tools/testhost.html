<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
  <style>
    body {
      background: burlywood;
      margin: 0;
      padding: 0;
      font-size: x-small;
      font-family: sans-serif;
    }
    #host {
        position:fixed;
        top: 15px;
        left:0;
        bottom:0;
        right:0;
        width:100%;
        height: calc(100% - 15px);
        border: none;
        margin: 0;
        padding: 0;
        overflow:hidden;
        background: white
    }
    .widgetHost {
      position:fixed;
      top: 0;
      right: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: rgba(0,0,0,0.2);
    }
    #state > span {
      padding-left: 1em;
      border-left: 1px solid black;
      margin-left: 1em;
      font-size: x-small;
    }
  </style>
</head>
<body>
<div>
  <small>VERONA MiniTestbed</small>
  <span id="state" />
</div>

<iframe id="host"></iframe>
<script>
  (async () => {
    const widgets = {};
    const state = {
      focus: 'unknown'
    };
    const host = document.getElementById('host');
    const player = await fetch('http://localhost:9999/player');
    const playerSettings = 'debounceStateMessages=0&debounceKeyboardEvents=0';
    const playerSrc = (await player.text())
      .replace(/const overridePlayerSettings = (location\.search);/, `const overridePlayerSettings = "${playerSettings}"`);
    const playerConfigRes = await fetch('http://localhost:9999/playerConfig');
    const playerConfigTxt = playerConfigRes ? await playerConfigRes.text() : null;
    const playerConfig = playerConfigTxt ? JSON.parse(playerConfigTxt) : {};
    const unit = await fetch('http://localhost:9999/unit')
    const unitDefinition = await unit.text() || 'not found';
    host.srcdoc = playerSrc;

    const updateState = (key, value) => {
      state[key] = value;
      document.getElementById('state').innerHTML =
        Object.entries(state).map(([key, value]) => `<span><b>${key}</b>: ${value}</span>`).join('');
    }

    const getSendingWidgetHostId = event => {
      const result = Object.entries(widgets)
        .find(([id, widget]) => widget.elem.contentWindow === event.source);
      if (!result) throw new Error("not send from a widgetHost");
      return result[0];
    }

    const getWidgetHost = widgetId => {
      if (!widgets[widgetId]) throw new Error(`No widgetHost with id ${widgetId} registered.`);
      return widgets[widgetId].elem;
    }

    const applyWidgetConfig = (widgetHost, widgetConfig) => {
      widgetHost.style.clipPath = widgetConfig.clipPath;
    }

    window.addEventListener('message', async  event => {
      if (event.data.type === 'vopReadyNotification') {
        host.contentWindow.postMessage({
          type: 'vopStartCommand',
          unitDefinition,
          sessionId: '1',
          playerConfig,
          unitState: {
            unitStateDataType: 'iqb-standard@1.0',
            dataParts: {}
          }
        }, '*');
      }

      if (event.data.type === 'vopStartWidget') {
        console.log('[vopStartWidget]');
        const widgetHost = document.createElement('iframe');
        const widgetCode = await fetch(`http://localhost:9999/${event.data.name}`);
        widgetHost.classList.add('widgetHost');
        widgetHost.srcdoc = (await widgetCode.text());
        document.body.appendChild(widgetHost);
        const widgetId = event.data.name + '#' + Object.values(widgets).filter(widget => widget.type === event.data.name).length;
        widgets[widgetId] = {
          elem: widgetHost,
          type: event.data.name
        };
        console.log(`widget registered: ${event.data.name} | id: ${widgetId}`)
      }

      if (event.data.type === 'vopWidgetReadyNotification') {
        const widgetHostId = getSendingWidgetHostId(event);
        console.log(`[vopWidgetReadyNotification] from ${widgetHostId}`);
        const widgetHost = getWidgetHost(widgetHostId);
        applyWidgetConfig(widgetHost, event.data.widgetConfig);
        widgetHost.contentWindow.postMessage({
          type: 'vopWidgetStartCommand',
          widgetId: widgetHostId,
          playerConfig
        }, '*');
      }

      if (event.data.type === 'vopCloseWidget') {
        console.log(`[vopCloseWidget] for ${event.data.widgetId}`);
        const widgetHost = getWidgetHost(event.data.widgetId);
        console.log({
          widgetId: event.data.widgetId,
          widgetHost,
          widgetHosts: widgets
        });
        document.body.removeChild(widgetHost);
        delete widgets[event.data.widgetId];
      }

      if (event.data.type === 'vopGetWidgetsRequestNotification') {
        console.log(`[vopGetWidgetsRequestNotification] for ${event.data.widgetId}`);
        const senderHost = (event.data.widgetId && widgets[event.data.widgetId]) ? widgets[event.data.widgetId].elem : host;
        senderHost.contentWindow.postMessage({
          sessionId: '1',
          type: 'vopGetWidgetsNotification',
          widgets: Object.entries(widgets).map(([id, widget]) => ({ id, type: widget.type }))
        }, '*');
      }

      if (event.data.type === 'vopChangeWidgetConfig') {
        console.log(`[vopChangeWidgetConfig] for ${event.data.widgetId}`);
        const widgetHost = getWidgetHost(event.data.widgetId);
        applyWidgetConfig(widgetHost, event.data.widgetConfig);
      }

      if (event.data.type === 'vopWindowFocusChangedNotification') {
        const sender = (event.data.widgetId && widgets[event.data.widgetId]) ? event.data.widgetId : 'player';
        updateState('focus', (event.data.hasFocus) ? sender : 'host');
      }
    }, false);

    window.addEventListener('blur', () => {
      //updateState('focus', undefined);
    });

    window.addEventListener('focus', () => {
      updateState('focus', 'host');
    });
  })();
</script>
</body>
</html>
