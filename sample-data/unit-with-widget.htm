<style>
  #data {
      max-height: 80%;
      overflow-y: scroll;
  }
</style>

<button id="openBtn1">Open Widget: Calculator</button>
<button id="closeBtn1">Close Widget: #0</button>
<button id="openBtn2">Open Widget: Avatar</button>
<button id="closeBtn2">Close Widget: #1</button>

<hr>
<h4>Messages</h4>
<ol id="data"></ol>


<script>
  document.getElementById('openBtn1').addEventListener('click', event => {
    console.log('openBtn1')
    event.preventDefault();
    Message.send.vopStartWidget('sample-data/calculator.html');
  });
  document.getElementById('closeBtn1').addEventListener('click', event => {
    console.log('closeBtn1')
    event.preventDefault();
    Message.send.vopCloseWidget('#0');
  });

  document.getElementById('openBtn2').addEventListener('click', event => {
    event.preventDefault();
    Message.send.vopStartWidget('sample-data/avatar-widget.html');
  });
  document.getElementById('closeBtn2').addEventListener('click', event => {
    event.preventDefault();
    Message.send.vopCloseWidget('#0');
  });


  let lastEventType = '';
  let lastEventCount = 0;
  window.parent.addEventListener('message', async  event => {
    const messageType = event.data.type + (event.data.widgetId ? ` (widget ${event.data.widgetId})` : '');
    const dataElem = document.getElementById('data');
    if (event.data.type === 'vopStateChangedNotification') {
      let content = '';
      if (event.data.bookletState && event.data.bookletState.length) {
        content += 'BookletState: <ul>' + Object.entries(event.data.bookletState)
          .map(([k, v]) => `<li>${k}: ${v}</li>`) + '</ul>';
      }
      if (event.data.unitState && event.data.unitState.dataParts) {
        content += 'dataParts: <ul>' + Object.entries(event.data.unitState.dataParts)
          .map(([chunkId, chunk]) => `<li>${chunkId}: ${chunk}</li>`) + '</ul>';
      }
      dataElem.innerHTML += `<li><b>${event.data.type}<b> : ${content}</li>`;
    } else {
      lastEventCount = (lastEventType === messageType) ? lastEventCount + 1 : 1;
      const counter = lastEventCount ? `(${lastEventCount})` : '';
      if (lastEventType === messageType) dataElem.querySelector(':scope > li:last-child').remove();
      dataElem.innerHTML += `<li><b>${messageType} ${counter}</li>`;
    }
    lastEventType = messageType;
  });
</script>
