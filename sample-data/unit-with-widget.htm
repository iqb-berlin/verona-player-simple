<style>
  #data {
      max-height: 80%;
      overflow-y: scroll;
  }
</style>

<h1>Unit using widgets</h1>

<h4>This is a testunit that interacts with various widgets.</h4>

<button id="openBtn1">Open Widget: Calculator</button>
<button id="openBtn2">Open Widget: Avatar</button>


<hr>
<h4>Widgets</h4>
<button id="ListBtn">Actualize list</button>
<table id="widgets">
  <thead>
    <tr><td>ID</td><td>type</td><td></td></tr>
  </thead>
  <tbody></tbody>
</table>


<hr>
<h4>Messages</h4>
<ol id="data"></ol>


<script>
  function openWidget(widgetType, event) {
    event.preventDefault();
    Message.send.vopStartWidget(widgetType);
    setTimeout(Message.send.vopGetWidgetsRequestNotification, 100);
  }

  function closeWidget(widgetId, event) {
    event.preventDefault();
    Message.send.vopCloseWidget(widgetId);
    setTimeout(Message.send.vopGetWidgetsRequestNotification, 100);
  }

  let lastEventType = '';
  let lastEventCount = 0;
  function processMessageEvent(receiver, event) {
    const messageType = event.data.type + (event.data.widgetId ? ` (widget ${event.data.widgetId})` : '');
    const dataElem = document.getElementById('data');
    if (event.data.type === 'vopStateChangedNotification') {
      let content = '';
      if (event.data.bookletState && event.data.bookletState.length) {
        content += 'BookletState: <ul>' + Object.entries(event.data.bookletState)
          .map(([k, v]) => `<li>${k}: ${v}</li>`) + '</ul>';
      }
      if (event.data.unitState && event.data.unitState.dataParts) {
        content += '<p>dataParts: <ul>' + Object.entries(event.data.unitState.dataParts)
          .map(([chunkId, chunk]) => `<li>${chunkId}: ${chunk}</li>`) + '</ul></p>';
      }
      dataElem.innerHTML += `<li><b>${receiver}</b> ${event.data.type} : ${content}</li>`;
    } else {
      lastEventCount = (lastEventType === messageType) ? lastEventCount + 1 : 1;
      const counter = lastEventCount ? `(${lastEventCount})` : '';
      if (lastEventType === messageType) dataElem.querySelector(':scope > li:last-child').remove();
      dataElem.innerHTML += `<li><b>${receiver}</b> ${messageType} ${counter}</li>`;
    }
    lastEventType = messageType;

    if (event.data.type === 'vopGetWidgetsNotification') {
      console.log(event.data.type, {YP: event.data});
      document.querySelector('#widgets tbody').innerHTML = '';
      (event.data?.widgets || [])
        .forEach(widget => {
          document.querySelector('#widgets tbody').innerHTML += `<tr><td>${widget.id}</td><td>${widget.type}</td><td><button onclick="closeWidget('${widget.id}', event)">X</button></td></tr>`;
        });
    }
  }

  window.parent.addEventListener('message', async  event => processMessageEvent('Host', event));
  window.addEventListener('message', async  event => processMessageEvent('Player', event));
  document.getElementById('openBtn1').addEventListener('click', event => openWidget('sample-data/calculator.html', event));
  document.getElementById('openBtn2').addEventListener('click', event => openWidget('sample-data/avatar-widget.html', event));
  document.getElementById('ListBtn').addEventListener('click', event => {
    event.preventDefault();
    Message.send.vopGetWidgetsRequestNotification();
  });
</script>
